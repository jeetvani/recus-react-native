name: Publish to npm

on:
  push:
    branches:
      - main

# Only run one publish at a time so concurrent pushes don't race.
concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve package info
        id: pkg
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PKG_NAME"     >> "$GITHUB_OUTPUT"
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Package: $PKG_NAME@$PKG_VERSION"

      - name: Check whether this version is already published
        id: check
        run: |
          PKG_NAME="${{ steps.pkg.outputs.name }}"
          PKG_VERSION="${{ steps.pkg.outputs.version }}"

          # `npm view <pkg>@<version> version` prints the version if it exists,
          # and is empty if that exact version has never been published. 
          PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || true)

          if [ -z "$PUBLISHED" ]; then
            echo "Version $PKG_VERSION is NOT on npm yet — will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $PKG_VERSION already published — skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag release
        if: steps.check.outputs.should_publish == 'true'
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
